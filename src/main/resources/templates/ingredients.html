<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="mk">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Ingredient Mappings</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f0f4f8;
            color: #2d3748;
            min-height: 100vh;
        }

        header {
            background: linear-gradient(135deg, #2b6cb0, #4299e1);
            color: white;
            padding: 24px 32px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
            text-align: center;
        }

        header h1 { font-size: 1.6rem; font-weight: 600; }

        .container {
            max-width: 860px;
            margin: 36px auto;
            padding: 0 20px;
        }

        .search-block {
            background: white;
            border-radius: 12px;
            padding: 28px 32px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.08);
            margin-bottom: 28px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .search-block label {
            display: block;
            font-weight: 600;
            font-size: 0.9rem;
            color: #4a5568;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            text-align: center;
        }

        /* Search input */
        #ingredientSearch {
            width: 100%;
            max-width: 500px;
            padding: 10px 14px;
            border: 1.5px solid #cbd5e0;
            border-radius: 8px;
            font-size: 1rem;
            margin-bottom: 12px;
            transition: border-color 0.2s;
        }

        #ingredientSearch:focus {
            outline: none;
            border-color: #4299e1;
        }

        #ingredientSelect {
            width: 100%;
            max-width: 500px;
            padding: 10px 14px;
            border: 1.5px solid #cbd5e0;
            border-radius: 8px;
            font-size: 0.95rem;
            background: white;
            cursor: pointer;
            max-height: 220px;
            overflow-y: auto;
        }

        #ingredientSelect option { padding: 6px; }

        /* Options Panel */
        #optionsPanel {
            display: none;
            background: white;
            border-radius: 12px;
            padding: 28px 32px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.08);
        }

        #optionsPanel h2 {
            font-size: 1rem;
            font-weight: 600;
            color: #4a5568;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 18px;
        }

        #selectedName {
            font-size: 1.1rem;
            font-weight: 700;
            color: #2b6cb0;
            margin-bottom: 20px;
            padding: 10px 14px;
            background: #ebf8ff;
            border-left: 4px solid #4299e1;
            border-radius: 0 8px 8px 0;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .option-card {
            border: 1.5px solid #e2e8f0;
            border-radius: 10px;
            padding: 18px 20px;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .option-card:hover {
            border-color: #4299e1;
            box-shadow: 0 2px 8px rgba(66,153,225,0.12);
        }

        .option-card .badge {
            display: inline-block;
            font-size: 0.72rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            padding: 2px 8px;
            border-radius: 20px;
            margin-bottom: 10px;
        }

        .option-card.opt1 .badge { background: #bee3f8; color: #2b6cb0; }
        .option-card.opt2 .badge { background: #c6f6d5; color: #276749; }

        .option-card .value {
            font-size: 0.95rem;
            color: #2d3748;
            line-height: 1.5;
        }

        .option-card .empty {
            font-size: 0.9rem;
            color: #a0aec0;
            font-style: italic;
        }

        #loadingSpinner {
            display: none;
            text-align: center;
            padding: 20px;
            color: #718096;
            font-size: 0.95rem;
        }

        @media (max-width: 540px) {
            .options-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<header>
    <h1>CHOOSE AN INGREDIENT</h1>
</header>

<div class="container">

    <div class="search-block">
        <label for="ingredientSearch">Листа на Ingredients</label>

        <!-- Search box -->
        <input type="text" id="ingredientSearch" placeholder="Пребарај ingredient..."/>

        <!-- Select list -->
        <select id="ingredientSelect" size="8">
            <option th:each="name : ${ingredientNames}"
                    th:value="${name}"
                    th:text="${name}">
            </option>
        </select>
    </div>

    <div id="loadingSpinner">⏳ Се вчитуваат опциите...</div>

    <div id="optionsPanel">
        <h2>Mapping Options</h2>
        <div id="selectedName"></div>
        <div class="options-grid">
            <div class="option-card opt1">
                <span class="badge">Option 1</span>
                <div class="value" id="opt1Value"></div>
            </div>
            <div class="option-card opt2">
                <span class="badge">Option 2</span>
                <div class="value" id="opt2Value"></div>
            </div>
        </div>
    </div>

</div>

<script>
    const searchInput  = document.getElementById('ingredientSearch');
    const selectEl     = document.getElementById('ingredientSelect');
    const optionsPanel = document.getElementById('optionsPanel');
    const loadingEl    = document.getElementById('loadingSpinner');
    const selectedName = document.getElementById('selectedName');
    const opt1Value    = document.getElementById('opt1Value');
    const opt2Value    = document.getElementById('opt2Value');

    // Зачувај ги сите оригинални options
    const allOptions = Array.from(selectEl.options).map(o => ({
        value: o.value,
        text: o.text
    }));

    // Пребарување / Филтер
    searchInput.addEventListener('input', () => {
        const q = searchInput.value.toLowerCase().trim();
        selectEl.innerHTML = '';
        const filtered = q
            ? allOptions.filter(o => o.text.toLowerCase().includes(q))
            : allOptions;

        filtered.forEach(item => {
            const opt = document.createElement('option');
            opt.value = item.value;
            opt.text  = item.text;
            selectEl.appendChild(opt);
        });

        if (filtered.length > 0) {
            selectEl.value = filtered[0].value;
            fetchOptions(filtered[0].value);
        } else {
            optionsPanel.style.display = 'none';
        }
    });

    // Избор од листата
    selectEl.addEventListener('change', () => {
        if (selectEl.value) fetchOptions(selectEl.value);
    });

    // AJAX повик
    function fetchOptions(name) {
        optionsPanel.style.display = 'none';
        loadingEl.style.display    = 'block';

        fetch(`/ingredients/options?name=${encodeURIComponent(name)}`)
            .then(r => r.json())
            .then(data => {
                loadingEl.style.display = 'none';
                selectedName.textContent = data.name;

                opt1Value.innerHTML = data.option1 || data.option_1
                    ? (data.option1 || data.option_1)
                    : '<span class="empty">Нема option 1</span>';

                opt2Value.innerHTML = data.option2 || data.option_2
                    ? (data.option2 || data.option_2)
                    : '<span class="empty">Нема option 2</span>';

                optionsPanel.style.display = 'block';
            })
            .catch(err => {
                loadingEl.style.display = 'none';
                console.error('Грешка:', err);
            });
    }
</script>

</body>
</html>
